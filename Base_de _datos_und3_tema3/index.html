<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVA: Técnicas de oratoria y expresión oral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-slate-50">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-lg flex-shrink-0 hidden md:flex md:flex-col">
            <div class="p-4">
                <div style="width: 150px; height: 150px;"
                    class="p-2 mx-auto flex items-center justify-center bg-white rounded-full shadow-lg border-2 border-green-500 transition-shadow duration-300 hover:shadow-green-400">
                    <img src="img/logo.webp" alt="Logo OVA" class="w-5/6 h-5/6 object-contain" loading="lazy">
                </div>
            </div>
            <nav class="mt-6 flex-1">
                <a href="#" class="sidebar-link active flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="introduccion"><span class="mr-3 text-xl">🚀</span> Introducción</a>
                <a href="#" class="sidebar-link flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="objetivo"><span class="mr-3 text-xl">🎯</span> Objetivos</a>
                <a href="#" class="sidebar-link flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="lectura"><span class="mr-3 text-xl">📚</span> Contenido</a>
                <a href="#" class="sidebar-link flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="actividad"><span class="mr-3 text-xl">✍️</span> Actividades</a>
                <a href="#" class="sidebar-link flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="evaluacion"><span class="mr-3 text-xl">✔️</span> Evaluación</a>
                <a href="#" class="sidebar-link flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="recurso"><span class="mr-3 text-xl">📖</span> Recursos</a>
                <a href="#" class="sidebar-link flex items-center py-3 px-6 font-medium text-slate-700"
                    data-target="bibliografia"><span class="mr-3 text-xl">📚</span> Bibliografía</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 pl-0 bg-gray-50 flex flex-col">
            <!-- Mobile Header -->
            <div class="md:hidden mb-6 flex flex-col items-center">
                <div style="width: 100px; height: 100px;"
                    class="p-2 flex items-center justify-center bg-white rounded-full shadow-lg transition-shadow duration-300 hover:shadow-green-400 mb-2">
                    <img src="img/logo.webp" alt="Logo OVA" class="w-5/6 h-5/6 object-contain" loading="lazy">
                </div>
                <select id="mobile-nav" class="w-full mt-2 p-2 border rounded-md bg-white shadow-sm">
                    <option value="introduccion">🚀 Introducción</option>
                    <option value="objetivo">🎯 Objetivos</option>
                    <option value="lectura">📚 Contenido</option>
                    <option value="actividad">✍️ Actividades</option>
                    <option value="evaluacion">✔️ Evaluación</option>
                    <option value="recurso">📖 Recursos</option>
                    <option value="bibliografia">📚 Bibliografía</option>
                </select>
            </div>
            <!-- Contenido de cada sección -->
            <div id="content-area" class="flex-1 p-6" style="display:block;">
                <p class="text-gray-500">Cargando contenido...</p>
            </div>

            <!-- Footer/Credits -->
            <footer class="mt-2 pt-6 border-t-2 border-slate-200 text-center">
                <p class="text-slate-600 font-medium">Creado por:</p>
                <p class="text-green-800 font-bold text-lg">Centro de Innovación en TIC para el apoyo de la Docencia
                    CINTIA</p>
                <p class="text-slate-500 text-sm">Universidad de Córdoba</p>
            </footer>
        </main>
    </div>
    

    <!-- Modal para ampliar imágenes -->
    <div id="imageModal" class="image-modal">
        <div class="modal-content">
            <img id="modalImage" src="" alt="Imagen ampliada">
            <button class="close-modal" id="closeModal">&times;</button>
        </div>
    </div>

    <script src="js/speech.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/activities.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/accordion.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/animations.js"></script>

    
</body>

</html>
