<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Técnica - Conexión de BD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Evaluación: Unidad 3 - Tema 1</h1>
            <p>Técnico en Programación Web</p>
        </header>

        <div id="quiz"></div>

        <div id="error-message" class="error-box hidden">
            ⚠️ Faltan preguntas por resolver. Por favor, responde todas antes de finalizar.
        </div>

        <div class="controls">
            <button id="submit-btn" class="btn-primary">Verificar Respuestas</button>
            <button id="retry-btn" class="btn-secondary hidden" onclick="location.reload()">Reintentar</button>
        </div>

        <div id="results" class="results-container hidden">
            <h2 id="score-title"></h2>
            <p id="score-text"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
